<!doctype html>

    <title>Haloa | Natural Pet Food</title>
    <script>
      (function() {
        // Polyfill global for libraries that expect it
        if (typeof global === 'undefined') {
          window.global = window;
        }

        // Specifically address "Cannot set property fetch of #<Window> which has only a getter"
        // by adding a dummy setter to the fetch property.
        function patchFetch(obj) {
          try {
            const desc = Object.getOwnPropertyDescriptor(obj, 'fetch') || 
                        Object.getOwnPropertyDescriptor(Object.getPrototypeOf(obj), 'fetch');
            
            if (desc && !desc.set && desc.configurable) {
              const originalFetch = obj.fetch;
              Object.defineProperty(obj, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { 
                  console.warn('Ignoring attempt to overwrite fetch'); 
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {
            // If we can't patch it, we'll just have to hope for the best
          }
        }

        patchFetch(window);
      })();
    </script>
